<!DOCTYPE html>
<html>
    <title>Login</title>
    <link rel="stylesheet" href="styles.css">
<body>
<div class="Diseño">
<h2>Iniciar sesion</h2>

    <input type="text" placeholder="Usuario" id="Usuario"><br><br>
    <input type="password" placeholder="Contraseña" id="Contraseña"><br><br>
    <button onclick="login()">Iniciar sesion</button>

<p id="mensaje"></p>

<script>
function login(){

let usuario = document.getElementById("Usuario").value;
let contraseña = document.getElementById("Contraseña").value;

let usuarioGuardado = "admin";
let contraseñaGuardada = "1234";

if(usuario === usuarioGuardado && contraseña === contraseñaGuardada){
    
     window.location.href = "calculadora.html";

}else{
    document.getElementById("mensaje").textContent = "Usuario o contraseña incorrectos";
}



document.getElementById("Usuario").value = "";
document.getElementById("Contraseña").value = "";

}
    </script>
    </div>

</body>
</html>
